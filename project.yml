name: BetterStreaming

options:
  bundleIdPrefix: com.betterstreaming
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.0"

settings:
  base:
    SWIFT_VERSION: 6.0
    MARKETING_VERSION: 1.0.0
    CURRENT_PROJECT_VERSION: 1
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    DEVELOPMENT_TEAM: 4HFQ952344
    CODE_SIGN_STYLE: Automatic

packages:
  BetterStreamingCore:
    path: Packages/BetterStreamingCore

targets:
  BetterStreaming:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App/BetterStreaming
        excludes:
          - Resources/**
      - path: App/BetterStreaming/Resources
        buildPhase: resources
    dependencies:
      - package: BetterStreamingCore
        product: BetterStreamingCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.betterstreaming.app
        PRODUCT_NAME: BetterStreaming
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
    info:
      path: App/BetterStreaming/Info.plist
      properties:
        CFBundleDisplayName: Evensong
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        ITSAppUsesNonExemptEncryption: false
        LSApplicationCategoryType: public.app-category.music
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - audio
        UILaunchScreen: {}
        NSLocalNetworkUsageDescription: Evensong connects to your local NAS or computer to stream and cache your media.
        NSBonjourServices:
          - _smb._tcp
          - _webdav._tcp
          - _ftp._tcp
        NSSupportsLiveActivities: false
        UIUserInterfaceStyle: Dark
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

  BetterStreamingTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App/BetterStreamingTests
    dependencies:
      - target: BetterStreaming
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.betterstreaming.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  BetterStreaming:
    build:
      targets:
        BetterStreaming: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - BetterStreamingTests
